name: Build and deploy radar

on:
  workflow_dispatch:
    inputs:
      trade_date:
        description: "YYYY-MM-DD；留空使用最近工作日"
        required: false
        type: string
      stage:
        description: "报告阶段"
        required: true
        default: confirmed
        type: choice
        options: [preliminary, confirmed]
      data_mode:
        description: "live 为真实数据；mock 仅用于演示"
        required: true
        default: live
        type: choice
        options: [live, mock]
  schedule:
    - cron: "30 20 * * 1-5"
      timezone: "Asia/Shanghai"
    - cron: "15 23 * * 1-5"
      timezone: "Asia/Shanghai"

concurrency:
  group: a-stock-radar-production
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.params.outputs.stage }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install .
      - name: Resolve parameters
        id: params
        shell: bash
        run: |
          STAGE="${{ inputs.stage }}"
          MODE="${{ inputs.data_mode }}"
          DATE_ARG="${{ inputs.trade_date }}"
          if [ -z "$STAGE" ]; then
            if [ "${{ github.event.schedule }}" = "30 20 * * 1-5" ]; then STAGE="preliminary"; else STAGE="confirmed"; fi
          fi
          if [ -z "$MODE" ]; then MODE="live"; fi
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "date_arg=$DATE_ARG" >> "$GITHUB_OUTPUT"
      - name: Generate report
        shell: bash
        run: |
          ARGS=(run --stage "${{ steps.params.outputs.stage }}" --data-mode "${{ steps.params.outputs.mode }}")
          if [ -n "${{ steps.params.outputs.date_arg }}" ]; then ARGS+=(--date "${{ steps.params.outputs.date_arg }}"); fi
          python -m a_stock_radar.cli "${ARGS[@]}"
      - name: Run tests
        run: pytest -q
      - name: Preserve raw snapshots for audit
        uses: actions/upload-artifact@v4
        with:
          name: raw-snapshots-${{ github.run_id }}-${{ github.run_attempt }}
          path: data/raw
          retention-days: 30
          if-no-files-found: warn
      - name: Persist compact history and reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history reports/latest reports/daily site/api/v3
          if ! git diff --cached --quiet; then
            git commit -m "data: update radar ${{ steps.params.outputs.stage }} [skip ci]"
            git push
          fi
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
